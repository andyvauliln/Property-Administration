{% load custom_filters %}

<!-- Create Modal -->
<div id="aiManagementCreateModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-4xl max-h-full">
        <div class="relative p-4 bg-white rounded-lg shadow dark:bg-gray-800 sm:p-5">
            <div class="flex justify-between items-center pb-4 mb-4 border-b dark:border-gray-600">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Create AI Management Entry</h3>
                <button type="button" id="closeCreateModal" class="text-gray-400 bg-transparent hover:bg-gray-200 rounded-lg text-sm p-1.5 ml-auto dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                    <span class="sr-only">Close</span>
                </button>
            </div>
            <form method="POST" action="/ai-management/">
                <input type="hidden" name="add" value="true">
                <div class="grid gap-4 mb-4 grid-cols-1 md:grid-cols-2">
                    <div>
                        <label for="create_name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Name</label>
                        <input type="text" name="name" id="create_name" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="Entry name">
                    </div>
                    <div>
                        <label for="create_entry_type" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Entry Type</label>
                        <select name="entry_type" id="create_entry_type" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                            <option value="knowledge">Knowledge</option>
                            <option value="prompt">AI Prompt</option>
                            <option value="ai_model">AI Model</option>
                        </select>
                    </div>
                    <div id="create_prompt_key_group" class="hidden">
                        <label for="create_prompt_key" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Prompt Key</label>
                        <select name="prompt_key" id="create_prompt_key" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                            <option value="">None</option>
                            <option value="ai_answer_system">AI Answer System</option>
                            <option value="ai_answer_user">AI Answer User</option>
                            <option value="ai_extract_check">AI Extract Check</option>
                            <option value="ai_extract_merge">AI Extract Merge</option>
                            <option value="contract_signed_message">Contract Signed Message</option>
                            <option value="ai_conversation_model">AI Conversation Model</option>
                        </select>
                        <p id="create_placeholder_hint" class="mt-1 text-xs text-gray-500 dark:text-gray-400 hidden"></p>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="create_description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Description</label>
                    <textarea name="description" id="create_description" rows="2" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="What is this for?"></textarea>
                </div>
                <div class="mb-4">
                    <label for="create_content" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Content</label>
                    <textarea name="content" id="create_content" rows="12" class="block p-2.5 w-full text-sm font-mono text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" placeholder="Knowledge text or prompt template"></textarea>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-500">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="aiManagementEditModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-4xl max-h-full">
        <div class="relative p-4 bg-white rounded-lg shadow dark:bg-gray-800 sm:p-5">
            <div class="flex justify-between items-center pb-4 mb-4 border-b dark:border-gray-600">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Edit AI Management Entry</h3>
                <button type="button" id="closeEditModal" class="text-gray-400 bg-transparent hover:bg-gray-200 rounded-lg text-sm p-1.5 ml-auto dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                    <span class="sr-only">Close</span>
                </button>
            </div>
            <form method="POST" action="/ai-management/">
                {% csrf_token %}
                <input type="hidden" name="edit" value="true">
                <input type="hidden" name="id" id="editId" value="">
                <div class="flex items-center space-x-4 mb-4">
                    <button type="submit" class="text-white bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-500">Update</button>
                </div>
                <div class="grid gap-4 mb-4 grid-cols-1 md:grid-cols-2">
                    <div>
                        <label for="edit_name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Name</label>
                        <input type="text" name="name" id="edit_name" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                    </div>
                    <div>
                        <label for="edit_entry_type" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Entry Type</label>
                        <select name="entry_type" id="edit_entry_type" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                            <option value="knowledge">Knowledge</option>
                            <option value="prompt">AI Prompt</option>
                            <option value="ai_model">AI Model</option>
                        </select>
                    </div>
                    <div id="edit_prompt_key_group" class="hidden">
                        <label for="edit_prompt_key" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Prompt Key</label>
                        <select name="prompt_key" id="edit_prompt_key" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                            <option value="">None</option>
                            <option value="ai_answer_system">AI Answer System</option>
                            <option value="ai_answer_user">AI Answer User</option>
                            <option value="ai_extract_check">AI Extract Check</option>
                            <option value="ai_extract_merge">AI Extract Merge</option>
                            <option value="contract_signed_message">Contract Signed Message</option>
                            <option value="ai_conversation_model">AI Conversation Model</option>
                        </select>
                        <p id="edit_placeholder_hint" class="mt-1 text-xs text-gray-500 dark:text-gray-400 hidden"></p>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="edit_description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Description</label>
                    <textarea name="description" id="edit_description" rows="2" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"></textarea>
                </div>
                <div class="mb-4">
                    <label for="edit_content" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Content</label>
                    <textarea name="content" id="edit_content" rows="12" class="block p-2.5 w-full text-sm font-mono text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"></textarea>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
(function() {
    const PROMPT_PLACEHOLDERS = {
        'ai_answer_system': 'No placeholders',
        'ai_answer_user': 'Supports: {context}, {message_body}',
        'ai_extract_check': 'Supports: {fields_ctx}, {message_body}',
        'ai_extract_merge': 'Supports: {knowledge_base}, {message_body}',
        'contract_signed_message': 'Supports: {booking_id}',
        'ai_conversation_model': 'No placeholders'
    };

    function togglePromptKeyGroup(prefix) {
        const entryType = document.getElementById(prefix + '_entry_type').value;
        const group = document.getElementById(prefix + '_prompt_key_group');
        const hint = document.getElementById(prefix + '_placeholder_hint');
        const promptKey = document.getElementById(prefix + '_prompt_key');
        if (entryType === 'prompt' || entryType === 'ai_model') {
            group.classList.remove('hidden');
            const key = promptKey.value;
            if (key && PROMPT_PLACEHOLDERS[key]) {
                hint.textContent = PROMPT_PLACEHOLDERS[key];
                hint.classList.remove('hidden');
            } else {
                hint.classList.add('hidden');
            }
        } else {
            group.classList.add('hidden');
            hint.classList.add('hidden');
        }
    }

    function setupModal(prefix) {
        const entryType = document.getElementById(prefix + '_entry_type');
        const promptKey = document.getElementById(prefix + '_prompt_key');
        entryType.addEventListener('change', () => togglePromptKeyGroup(prefix));
        promptKey.addEventListener('change', () => togglePromptKeyGroup(prefix));
    }

    document.addEventListener('DOMContentLoaded', function() {
        setupModal('create');
        setupModal('edit');

        const closeCreate = document.getElementById('closeCreateModal');
        const closeEdit = document.getElementById('closeEditModal');
        const createModal = document.getElementById('aiManagementCreateModal');
        const editModal = document.getElementById('aiManagementEditModal');

        closeCreate.addEventListener('click', function() {
            createModal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });
        closeEdit.addEventListener('click', function() {
            editModal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        });

        createModal.addEventListener('click', function(e) {
            if (e.target === createModal) {
                createModal.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            }
        });
        editModal.addEventListener('click', function(e) {
            if (e.target === editModal) {
                editModal.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (createModal) createModal.classList.add('hidden');
                if (editModal) editModal.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            }
        });
    });

    window.openEditModal = function(item) {
        document.getElementById('editId').value = item.id;
        document.getElementById('edit_name').value = item.name || '';
        document.getElementById('edit_entry_type').value = item.entry_type || 'knowledge';
        document.getElementById('edit_prompt_key').value = item.prompt_key || '';
        document.getElementById('edit_description').value = item.description || '';
        document.getElementById('edit_content').value = item.content || '';
        togglePromptKeyGroup('edit');
        document.getElementById('aiManagementEditModal').classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    };
})();
</script>
